# Enable native CPU instruction sets for every supported platform.
# On Windows, only x86-64 is supported (§18.5 — ARM64 Windows falls back to
# scalar paths in memchr / simd-json / sonic-rs).

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "target-cpu=native"]

# AArch64 Linux / macOS — NEON is enabled (§18.5)
[target.aarch64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]
